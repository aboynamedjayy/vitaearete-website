<!DOCTYPE html>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --forest:    #1a5c47;
  --gold:      #c8a96e;
  --gold-lt:   #dfc99a;
  --parchment: #f0e9d8;
  --bg:        #111410;
  --text-mid:  rgba(240,233,216,.6);
  --text-dim:  rgba(240,233,216,.4);
  --border:    rgba(200,169,110,.12);
}
body {
  background: var(--bg);
  color: var(--parchment);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}
.logo {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 1.4rem;
  font-weight: 300;
  letter-spacing: .08em;
  color: var(--parchment);
  margin-bottom: 3rem;
  text-decoration: none;
}
.logo em { color: var(--gold); font-style: italic; }
.code {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(6rem, 20vw, 10rem);
  font-weight: 300;
  color: var(--gold);
  opacity: .18;
  line-height: 1;
  margin-bottom: 1rem;
}
h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  font-weight: 300;
  color: var(--parchment);
  margin-bottom: .75rem;
}
p {
  font-size: .95rem;
  color: var(--text-mid);
  line-height: 1.8;
  max-width: 420px;
  margin-bottom: 2.5rem;
}
.btn {
  display: inline-block;
  padding: .85rem 2rem;
  font-family: 'DM Sans', sans-serif;
  font-size: .72rem;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  text-decoration: none;
  border: 1px solid var(--gold);
  color: var(--gold);
  background: transparent;
  transition: all .2s;
  margin: .4rem;
}
.btn:hover { background: rgba(200,169,110,.08); }
.btn--gold { background: var(--gold); color: var(--bg); border-color: var(--gold); }
.btn--gold:hover { background: var(--gold-lt); }
.divider {
  width: 40px;
  height: 1px;
  background: var(--border);
  margin: 3rem auto;
}
.tagline {
  font-size: .72rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--text-dim);
}
</style>
</head>
<body>
  <a href="/" class="logo">Vitae <em>Arete</em></a>
  <div class="code">404</div>
  <h1>This page doesn't exist.</h1>
  <p>The page you're looking for may have moved or never existed. Let's get you back on track.</p>
  <div>
    <a href="/" class="btn btn--gold">Back to Home</a>
    <a href="/#contact" class="btn">Contact Jason</a>
  </div>
  <div class="divider"></div>
  <p class="tagline">Vitae Arete · A life of excellence, nourished.</p>
</body>
</html>
